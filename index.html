<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Пригласительное</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <section id="intro" class="screen screen--active" aria-label="Экран конверта">
    <h2 class="intro-title">Нажмите, чтобы открыть</h2>
    <button id="envelopeButton" class="envelope-button" type="button" aria-label="Открыть приглашение">
      <img
        class="envelope-image"
        src="assets/envelope.png"
        alt="Конверт"
      />
    </button>
  </section>

  <section id="landing" class="screen" aria-label="Лендинг приглашения">
    <main class="landing-box">
      <div class="marquee-container" aria-hidden="true">
        <div class="marquee marquee--upper">
          <div class="marquee__track marquee__track--right">
            <span>ВАУ! У НАС СВАДЬБА! ВАУ! У НАС СВАДЬБА! ВАУ! У НАС СВАДЬБА! ВАУ! У НАС СВАДЬБА! ВАУ! У НАС СВАДЬБА! </span>
          </div>
        </div>
        <div class="marquee marquee--lower">
          <div class="marquee__track marquee__track--left">
            <span>ВАУ! У НАС СВАДЬБА! ВАУ! У НАС СВАДЬБА! ВАУ! У НАС СВАДЬБА! ВАУ! У НАС СВАДЬБА! ВАУ! У НАС СВАДЬБА! ВАУ! У НАС СВАДЬБА! </span>
          </div>
        </div>
      </div>

      <svg class="ring-text-layer" viewBox="0 0 354.17 344.59" aria-hidden="true">
        <defs>
          <path
            id="ringTextPath"
            d="M 177.085,172.295 m -156,0 a 156,156 0 1,1 312,0 a 156,156 0 1,1 -312,0"
          />
        </defs>
        <text class="photo-ellipse__ring-text">
          <textPath href="#ringTextPath" startOffset="0%">
            мы женимся! мы женимся! мы женимся! мы женимся! мы женимся! мы женимся! мы женимся! мы женимся! мы женимся! 
          </textPath>
        </text>
      </svg>

      <section class="photo-ellipse" aria-label="Фото пары">
        <img class="photo-ellipse__image" src="assets/couple-photo.png" alt="Фото пары" />
      </section>
    </main>
  </section>

  <script src="script.js"></script>
</body>
</html>
