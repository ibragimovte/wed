<!doctype html>
<html lang=ru>
<head>
  <meta charset=UTF-8 />
  <meta name=viewport content=width=device-width, initial-scale=1.0 />
  <title>RSVP Admin</title>
  <style>
    body { font-family: Manrope, Arial, sans-serif; margin: 0; background: #e9edf1; color: #1f2a44; }
    .wrap { max-width: 420px; margin: 40px auto; padding: 20px; }
    .card { background: #fff; border-radius: 16px; padding: 16px; box-shadow: 0 8px 24px rgba(0,0,0,.08); }
    h1 { margin: 0 0 12px; font-size: 22px; }
    p { margin: 0 0 12px; font-size: 14px; color: #4a5872; }
    input { width: 100%; height: 44px; border: 1px solid #c7d7e6; border-radius: 10px; padding: 0 12px; font-size: 14px; }
    .row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 12px; }
    button { height: 44px; border: 0; border-radius: 10px; background: #a9cff0; color: #1f2a44; font-weight: 600; cursor: pointer; }
    .ghost { background: #f3e6dc; }
    .msg { margin-top: 12px; font-size: 13px; min-height: 18px; }
  </style>
</head>
<body>
  <div class=wrap>
    <div class=card>
      <h1>RSVP Admin</h1>
      <p>Вставьте Bearer токен и скачайте выгрузку.</p>
      <input id=token type=password placeholder=ADMIN_TOKEN />
      <div class=row>
        <button id=csv>Скачать CSV</button>
        <button id=jsonl class=ghost>Скачать JSONL</button>
      </div>
      <div class=msg id=msg></div>
    </div>
  </div>

  <script>
    const msg = document.getElementById(msg);
    const tokenInput = document.getElementById(token);

    async function download(path, filename) {
      const token = tokenInput.value.trim();
      if (!token) {
        msg.textContent = Введите ADMIN_TOKEN;
        return;
      }
      msg.textContent = Загрузка...;
      try {
        const res = await fetch(path, {
          headers: { Authorization: `Bearer ${token}` }
        });
        if (!res.ok) {
          msg.textContent = `Ошибка ${res.status}`;
          return;
        }
        const blob = await res.blob();
        const url = URL.createObjectURL(blob);
        const a = document.createElement(a);
        a.href = url;
        a.download = filename;
        document.body.appendChild(a);
        a.click();
        a.remove();
        URL.revokeObjectURL(url);
        msg.textContent = Готово;
      } catch {
        msg.textContent = Ошибка сети;
      }
    }

    document.getElementById(csv).addEventListener(click, () => {
      const d = new Date().toISOString().slice(0, 10);
      download(/admin/export.csv, `rsvp-${d}.csv`);
    });

    document.getElementById(jsonl).addEventListener(click, () => {
      const d = new Date().toISOString().slice(0, 10);
      download(/admin/export.jsonl, `rsvp-${d}.jsonl`);
    });
  </script>
</body>
</html>
